<!DOCTYPE html>
<html>
<head>
   <title>Brain Tumor Detection</title>
   <script type="text/javascript">
      function previewImage(event) {
         var input = event.target;
         var image = document.getElementById('preview');
         if (input.files && input.files[0]) {
            var reader = new FileReader();
            reader.onload = function(e) {
               image.src = e.target.result;
            }
            reader.readAsDataURL(input.files[0]);
         }
      }
   </script>
   <style>
      #preview {
         width: 300px;
         height: 300px;
      }
   </style>
</head>
<body>
    <center><h1 style="font-family:Microsoft YaHei UI;">Brain Tumor Detection Using Machine </h1>
    <h2 style="font-family:Microsoft YaHei UI;">Upload an Image</h2>
    <form action="/predict" method="post" enctype="multipart/form-data">
        <input type="file" name="image" accept="image/*" onchange="previewImage(event)"><br><br><br>
        <img style="font-family:Microsoft YaHei UI;" id="preview" alt="Selected Image"><br><br>
        <input style="font-family:Microsoft YaHei UI;" type="submit" value="Predict">
        </form>
        </center>
</body>
</html>
